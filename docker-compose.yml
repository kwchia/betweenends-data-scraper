services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: betweenends
      POSTGRES_PASSWORD: betweenends
      POSTGRES_DB: betweenends
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betweenends"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5847:5000"
    environment:
      DATABASE_URL: postgresql://betweenends:betweenends@db:5432/betweenends
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FLASK_APP: wsgi:app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
